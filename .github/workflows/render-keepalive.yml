name: Render Keep Alive

on:
  schedule:
    # Every 5 minutes to reduce chance of Render free instance sleeping.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Render health endpoint
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          if [ -z "$RENDER_APP_URL" ]; then
            echo "RENDER_APP_URL secret is not set"
            exit 1
          fi

          URL="${RENDER_APP_URL%/}/api/data/health"
          echo "Pinging $URL"

          # Fail workflow if status is not 2xx/3xx.
          curl --fail --show-error --silent --max-time 25 "$URL" > /tmp/health.json
          echo "Ping OK"
          cat /tmp/health.json
